name: Smoke Test

on:
  pull_request:
    branches: [main, prod]

# Cancel superseded runs on the same PR
concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Start preview server
        run: npm run preview &

      - name: Wait for server
        run: npx --yes wait-on http://localhost:4321 --timeout 60000

      - name: Crawl for broken links
        run: |
          npx --yes linkinator http://localhost:4321 \
            --recurse \
            --skip "^(?!http://localhost:4321)"
