name: Generate llms.txt

on:
  push:
    branches: [main]
    paths:
      - 'src/content/docs/**'
  workflow_dispatch:

jobs:
  generate-llms-txt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate llms.txt
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: python scripts/generate_llms_txt.py

      - name: Open or update PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff --quiet public/llms.txt && echo "No changes" && exit 0

          BRANCH="chore/update-llms-txt"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Reuse existing branch or create new one
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" > /dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard origin/main
          else
            git checkout -b "$BRANCH"
          fi

          git add public/llms.txt
          git commit -m "chore: update llms.txt"
          git push --force-with-lease origin "$BRANCH"

          # Create PR only if one doesn't already exist
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "chore: update llms.txt" \
              --body "Auto-generated from documentation changes." \
              --base main \
              --head "$BRANCH"
          else
            echo "Updated existing PR #$EXISTING_PR"
          fi
