name: Content Request
description: Suggest a new guide, page, or expanded coverage
title: "[Content]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: content-description
    attributes:
      label: What's Missing
      description: What topic or content would you like to see documented?
      placeholder: Describe the docs you'd like to see
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this? What are you trying to accomplish?
      placeholder: Explain the problem this content would solve
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, examples, or references that might help.
      placeholder: Add any other context here
    validations:
      required: false
