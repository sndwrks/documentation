name: Documentation Issue
description: Report something wrong, unclear, or missing in the docs
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page-url
    attributes:
      label: Page
      description: Which page has the problem? Paste the URL or the file path.
      placeholder: "https://docs.sndwrks.com/products/sndwrks-local/software/macros"
    validations:
      required: true

  - type: textarea
    id: whats-wrong
    attributes:
      label: What's Wrong
      description: Describe the problem. Is something incorrect, confusing, outdated, or missing?
      placeholder: Tell us what you found
    validations:
      required: true

  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested Correction
      description: If you know what it should say, let us know. Otherwise leave blank.
      placeholder: Optional - what should it say instead?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples that might help.
      placeholder: Add any other context here
    validations:
      required: false
