<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 230" role="img" aria-labelledby="t">
  <title id="t">UDP show-control example: a fader streams values, one drops mid-flight, the receiver keeps up with the next value</title>
  <style>
    .fg { fill: #2b2b2b; }
    .sfg { stroke: #2b2b2b; }
    .ac { fill: #c2f280; }
    .dr { fill: #d97757; stroke: #d97757; }
    .label { font: 500 13px ui-sans-serif, system-ui, sans-serif; fill: #2b2b2b; }
    .pktlbl { font: 700 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #2b2b2b; }
    .small { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #2b2b2b; }
    .wire { stroke: #b8b6ad; stroke-dasharray: 4 4; fill: none; }
    .track { stroke: #b8b6ad; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #d8d6cf; }
      .sfg { stroke: #d8d6cf; }
      .label { fill: #d8d6cf; }
      .small { fill: #d8d6cf; }
      .wire { stroke: #4f4d48; }
      .track { stroke: #4f4d48; }
    }
  </style>

  <rect x="40" y="50" width="110" height="130" fill="none" class="sfg" stroke-width="1.5"/>
  <text x="95" y="200" text-anchor="middle" class="label">Fader</text>
  <line x1="95" y1="65" x2="95" y2="165" class="track" stroke-width="3" stroke-linecap="round"/>
  <g>
    <rect x="78" y="-7" width="34" height="14" class="ac" stroke="#2b2b2b" stroke-width="1.2"/>
    <animateTransform attributeName="transform" type="translate"
      values="0 165; 0 80; 0 80; 0 165"
      keyTimes="0; 0.8; 0.95; 1" dur="6s" repeatCount="indefinite"/>
  </g>

  <rect x="450" y="50" width="110" height="130" fill="none" class="sfg" stroke-width="1.5"/>
  <text x="505" y="200" text-anchor="middle" class="label">Server</text>
  <rect x="475" y="65" width="20" height="100" fill="none" class="sfg" stroke-width="1"/>
  <g transform="translate(475 165)">
    <rect x="0" y="-100" width="20" height="100" class="ac" stroke="#2b2b2b" stroke-width="1">
      <animateTransform attributeName="transform" type="scale"
        values="1 0; 1 0; 1 0.16; 1 0.16; 1 0.33; 1 0.33; 1 0.65; 1 0.65; 1 0.83; 1 0.83; 1 1.0; 1 1.0; 1 0"
        keyTimes="0; 0.233; 0.234; 0.367; 0.368; 0.633; 0.634; 0.767; 0.768; 0.9; 0.901; 0.99; 1"
        dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <line x1="150" y1="115" x2="450" y2="115" class="wire" stroke-width="1.5"/>

  <g opacity="0" transform="translate(-9999 -9999)">
    <rect x="-18" y="-11" width="36" height="22" class="ac" stroke="#2b2b2b" stroke-width="1.2"/>
    <text y="4" text-anchor="middle" class="pktlbl">12</text>
    <animateTransform attributeName="transform" type="translate"
      values="150,115; 450,115; 450,115"
      keyTimes="0; 0.233; 1" dur="6s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 0; 0" keyTimes="0; 0.233; 0.24; 1"
      dur="6s" begin="0s" repeatCount="indefinite"/>
  </g>

  <g opacity="0" transform="translate(-9999 -9999)">
    <rect x="-18" y="-11" width="36" height="22" class="ac" stroke="#2b2b2b" stroke-width="1.2"/>
    <text y="4" text-anchor="middle" class="pktlbl">24</text>
    <animateTransform attributeName="transform" type="translate"
      values="150,115; 450,115; 450,115"
      keyTimes="0; 0.233; 1" dur="6s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 0; 0" keyTimes="0; 0.233; 0.24; 1"
      dur="6s" begin="0.8s" repeatCount="indefinite"/>
  </g>

  <g opacity="0" transform="translate(-9999 -9999)">
    <rect x="-18" y="-11" width="36" height="22" fill="#d97757" stroke="#2b2b2b" stroke-width="1.2"/>
    <text y="4" text-anchor="middle" class="pktlbl" fill="#fff">36</text>
    <animateTransform attributeName="transform" type="translate"
      values="150,115; 300,115; 320,170"
      keyTimes="0; 0.117; 0.18" dur="6s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 0; 0" keyTimes="0; 0.117; 0.18; 1"
      dur="6s" begin="1.6s" repeatCount="indefinite"/>
  </g>

  <g opacity="0" transform="translate(-9999 -9999)">
    <rect x="-18" y="-11" width="36" height="22" class="ac" stroke="#2b2b2b" stroke-width="1.2"/>
    <text y="4" text-anchor="middle" class="pktlbl">48</text>
    <animateTransform attributeName="transform" type="translate"
      values="150,115; 450,115; 450,115"
      keyTimes="0; 0.233; 1" dur="6s" begin="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 0; 0" keyTimes="0; 0.233; 0.24; 1"
      dur="6s" begin="2.4s" repeatCount="indefinite"/>
  </g>

  <g opacity="0" transform="translate(-9999 -9999)">
    <rect x="-18" y="-11" width="36" height="22" class="ac" stroke="#2b2b2b" stroke-width="1.2"/>
    <text y="4" text-anchor="middle" class="pktlbl">60</text>
    <animateTransform attributeName="transform" type="translate"
      values="150,115; 450,115; 450,115"
      keyTimes="0; 0.233; 1" dur="6s" begin="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 0; 0" keyTimes="0; 0.233; 0.24; 1"
      dur="6s" begin="3.2s" repeatCount="indefinite"/>
  </g>

  <g opacity="0" transform="translate(-9999 -9999)">
    <rect x="-18" y="-11" width="36" height="22" class="ac" stroke="#2b2b2b" stroke-width="1.2"/>
    <text y="4" text-anchor="middle" class="pktlbl">72</text>
    <animateTransform attributeName="transform" type="translate"
      values="150,115; 450,115; 450,115"
      keyTimes="0; 0.233; 1" dur="6s" begin="4.0s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 0; 0" keyTimes="0; 0.233; 0.24; 1"
      dur="6s" begin="4.0s" repeatCount="indefinite"/>
  </g>

  <text x="300" y="220" text-anchor="middle" class="small">one packet drops · the next value is already on its way</text>
</svg>
