<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" role="img" aria-labelledby="t">
  <title id="t">UDP as regular post: letters are dropped into the mailbox, one gets lost, no receipts</title>
  <style>
    .fg { fill: #2b2b2b; }
    .sfg { stroke: #2b2b2b; }
    .ac { fill: #c2f280; }
    .dr { fill: #d97757; stroke: #d97757; }
    .label { font: 500 14px ui-sans-serif, system-ui, sans-serif; fill: #2b2b2b; }
    .small { font: 500 11px ui-sans-serif, system-ui, sans-serif; fill: #2b2b2b; }
    .wire { stroke: #b8b6ad; stroke-dasharray: 4 4; fill: none; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #d8d6cf; }
      .sfg { stroke: #d8d6cf; }
      .label { fill: #d8d6cf; }
      .small { fill: #d8d6cf; }
      .wire { stroke: #4f4d48; }
    }
  </style>

  <rect x="30" y="80" width="130" height="60" fill="none" class="sfg" stroke-width="1.5"/>
  <text x="95" y="116" text-anchor="middle" class="label">Sender</text>

  <rect x="440" y="80" width="130" height="60" fill="none" class="sfg" stroke-width="1.5"/>
  <text x="505" y="116" text-anchor="middle" class="label">Mailbox</text>

  <line x1="160" y1="110" x2="440" y2="110" class="wire" stroke-width="1.5"/>

  <g opacity="0" transform="translate(-9999 -9999)">
    <rect x="-15" y="-10" width="30" height="20" fill="#fff" class="sfg" stroke-width="1.5"/>
    <path d="M -15 -10 L 0 3 L 15 -10" fill="none" class="sfg" stroke-width="1.2"/>
    <animateTransform attributeName="transform" type="translate"
      values="160,110; 440,110; 440,110"
      keyTimes="0; 0.6; 1" dur="4s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 0; 0" keyTimes="0; 0.6; 0.62; 1"
      dur="4s" begin="0s" repeatCount="indefinite"/>
  </g>

  <g opacity="0" transform="translate(-9999 -9999)">
    <rect x="-15" y="-10" width="30" height="20" fill="#fff" class="sfg" stroke-width="1.5"/>
    <path d="M -15 -10 L 0 3 L 15 -10" fill="none" class="sfg" stroke-width="1.2"/>
    <animateTransform attributeName="transform" type="translate"
      values="160,110; 440,110; 440,110"
      keyTimes="0; 0.6; 1" dur="4s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 0; 0" keyTimes="0; 0.6; 0.62; 1"
      dur="4s" begin="0.6s" repeatCount="indefinite"/>
  </g>

  <g opacity="0" transform="translate(-9999 -9999)">
    <rect x="-15" y="-10" width="30" height="20" fill="#fff" class="sfg" stroke-width="1.5"/>
    <path d="M -15 -10 L 0 3 L 15 -10" fill="none" class="sfg" stroke-width="1.2"/>
    <animateTransform attributeName="transform" type="translate"
      values="160,110; 350,110; 350,110"
      keyTimes="0; 0.5; 1" dur="4s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 0; 0" keyTimes="0; 0.3; 0.5; 1"
      dur="4s" begin="1.2s" repeatCount="indefinite"/>
  </g>

  <g opacity="0" transform="translate(-9999 -9999)">
    <rect x="-15" y="-10" width="30" height="20" fill="#fff" class="sfg" stroke-width="1.5"/>
    <path d="M -15 -10 L 0 3 L 15 -10" fill="none" class="sfg" stroke-width="1.2"/>
    <animateTransform attributeName="transform" type="translate"
      values="160,110; 440,110; 440,110"
      keyTimes="0; 0.6; 1" dur="4s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="1; 1; 0; 0" keyTimes="0; 0.6; 0.62; 1"
      dur="4s" begin="1.8s" repeatCount="indefinite"/>
  </g>

  <text x="300" y="190" text-anchor="middle" class="small">No confirmation - one lost - sender doesn't know</text>
</svg>
